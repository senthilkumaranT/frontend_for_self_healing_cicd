name: Cookie Couture CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run Vitest Suite
      run: npm run test > test_output.log 2>&1 || (cat test_output.log && exit 1)

    - name: Trigger Webhook on Failure
      if: failure()
      run: |
        python3 -c "
        import json, urllib.request, os
        log_data = open('test_output.log').read()
        payload = {
            'run_id': '${{ github.run_id }}',
            'repo': '${{ github.repository }}',
            'branch': '${{ github.ref_name }}',
            'head_sha': '${{ github.sha }}',
            'logs': log_data
        }
        req = urllib.request.Request(
            '${{ secrets.WEB_URL }}',
            data=json.dumps(payload).encode('utf-8'),
            headers={
                'Authorization': 'Bearer ${{ secrets.WEBHOOK_SECRET }}',
                'Content-Type': 'application/json'
            },
            method='POST'
        )
        try:
            with urllib.request.urlopen(req, timeout=120) as response:
                print(response.read().decode())
        except Exception as e:
            print('Error triggering webhook:', e)
        "

